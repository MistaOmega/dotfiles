$mainMod = SUPER
$ipc     = qs -c noctalia-shell ipc call
# 1. APPLICATIONS
bind = $mainMod, RETURN, exec, $terminal #"Terminal"
bind = $mainMod, E,      exec, $fileManager #"File Manager"
bind = $mainMod, C,      killactive, #"Close Window"
bind = $mainMod, M,      exit, #"Exit Hyprland"
bind = $mainMod, F,      togglefloating, #"Toggle Float"
bind = $mainMod, P,      pseudo, #"Toggle Pseudo"
bind = $mainMod, J,      togglesplit, #"Toggle Split"

# 2. NOCTALIA
bind = $mainMod, R,      exec, $ipc launcher toggle #"Launcher"
bind = $mainMod, V,      exec, $ipc launcher clipboard #"Clipboard History"
bind = $mainMod, L,      exec, $ipc lockScreen lock #"Lock Screen"
bind = $mainMod, A,      exec, $ipc controlCenter toggle #"Control Center"
bind = $mainMod, N,      exec, $ipc notifications toggleHistory #"Notifications"
bind = $mainMod, X,      exec, $ipc sessionMenu toggle #"Session Menu"
bind = $mainMod, comma,  exec, $ipc settings toggle #"Settings"
bind = $mainMod, slash,  exec, $ipc plugin:keybind-cheatsheet toggle #"Keybind Cheatsheet"
bind = $mainMod, T,      exec, $ipc plugin togglePanel todo #"Todo"
bind = $mainMod SHIFT, S, exec, $ipc plugin openPanel screenshot #"Screenshots"


# 3. SCREENSHOTS
bind = ,             Print,  exec, grimblast --notify copysave area #"Screenshot Region"
bind = SHIFT,        Print,  exec, grimblast --notify copysave output #"Screenshot Monitor"
bind = $mainMod,     Print,  exec, grimblast --notify copysave active #"Screenshot Window"
bind = $mainMod,     S,      exec, grimblast --notify copysave area #"Screenshot Region (alt)"
bind = $mainMod SHIFT, I,    exec, hyprpicker -f hex -a #"Color Picker"

# 4. FOCUS
bind = $mainMod, left,  movefocus, l #"Focus Left"
bind = $mainMod, right, movefocus, r #"Focus Right"
bind = $mainMod, up,    movefocus, u #"Focus Up"
bind = $mainMod, down,  movefocus, d #"Focus Down"

# 5. WORKSPACES
bind = $mainMod, 1, workspace, 1 #"Workspace 1"
bind = $mainMod, 2, workspace, 2 #"Workspace 2"
bind = $mainMod, 3, workspace, 3 #"Workspace 3"
bind = $mainMod, 4, workspace, 4 #"Workspace 4"
bind = $mainMod, 5, workspace, 5 #"Workspace 5"
bind = $mainMod, 6, workspace, 6 #"Workspace 6"
bind = $mainMod, 7, workspace, 7 #"Workspace 7"
bind = $mainMod, 8, workspace, 8 #"Workspace 8"
bind = $mainMod, 9, workspace, 9 #"Workspace 9"
bind = $mainMod, 0, workspace, 10 #"Workspace 10"

bind = $mainMod SHIFT, 1, movetoworkspace, 1 #"Move to Workspace 1"
bind = $mainMod SHIFT, 2, movetoworkspace, 2 #"Move to Workspace 2"
bind = $mainMod SHIFT, 3, movetoworkspace, 3 #"Move to Workspace 3"
bind = $mainMod SHIFT, 4, movetoworkspace, 4 #"Move to Workspace 4"
bind = $mainMod SHIFT, 5, movetoworkspace, 5 #"Move to Workspace 5"
bind = $mainMod SHIFT, 6, movetoworkspace, 6 #"Move to Workspace 6"
bind = $mainMod SHIFT, 7, movetoworkspace, 7 #"Move to Workspace 7"
bind = $mainMod SHIFT, 8, movetoworkspace, 8 #"Move to Workspace 8"
bind = $mainMod SHIFT, 9, movetoworkspace, 9 #"Move to Workspace 9"
bind = $mainMod SHIFT, 0, movetoworkspace, 10 #"Move to Workspace 10"

bind = CTRL ALT $mainMod SHIFT, comma,  movecurrentworkspacetomonitor, l #"Move Workspace Left Monitor"
bind = CTRL ALT $mainMod SHIFT, period, movecurrentworkspacetomonitor, r #"Move Workspace Right Monitor"

# 6. SCRATCHPAD
bind = $mainMod,       grave, togglespecialworkspace, magic #"Toggle Scratchpad"
bind = $mainMod SHIFT, grave, movetoworkspace, special:magic #"Move to Scratchpad"

# 7. MEDIA
bindel = , XF86AudioRaiseVolume, exec, $ipc volume increase #"Volume Up"
bindel = , XF86AudioLowerVolume, exec, $ipc volume decrease #"Volume Down"
bindl  = , XF86AudioMute,        exec, $ipc volume muteOutput #"Mute"
bindl  = , XF86AudioMicMute,     exec, $ipc volume muteMicrophone #"Mute Mic"
bind   = , XF86AudioPlay,        exec, playerctl play-pause #"Play/Pause"
bind   = , XF86AudioNext,        exec, playerctl next #"Next Track"
bind   = , XF86AudioPrev,        exec, playerctl previous #"Previous Track"

# 8. WINDOWS
bind = $mainMod SHIFT, left,  movewindow, l #"Move Window Left"
bind = $mainMod SHIFT, right, movewindow, r #"Move Window Right"
bind = $mainMod SHIFT, up,    movewindow, u #"Move Window Up"
bind = $mainMod SHIFT, down,  movewindow, d #"Move Window Down"

bind = $mainMod CTRL, left,  resizeactive, -50 0 #"Shrink Horizontal"
bind = $mainMod CTRL, right, resizeactive,  50 0 #"Grow Horizontal"
bind = $mainMod CTRL, up,    resizeactive,  0 -50 #"Shrink Vertical"
bind = $mainMod CTRL, down,  resizeactive,  0  50 #"Grow Vertical"

bind = $mainMod, Tab,        cyclenext, #"Next Window"
bind = $mainMod SHIFT, Tab,  cyclenext, prev #"Previous Window"
bind = $mainMod, G,          togglegroup, #"Toggle Group"

# 9. MISC
bind = $mainMod SHIFT, R, exec, hyprctl reload #"Reload Hyprland Config"
bind = $mainMod, F11,    fullscreen, 0 #"Fullscreen"
bind = $mainMod SHIFT, F, fullscreen, 1 #"Fullscreen (no bar)"
bind = $mainMod ALT, G,   exec, $ipc idleInhibitor toggle #"Toggle Idle Inhibitor"
bind = $mainMod, B,       exec, $ipc bar toggle #"Toggle Bar"
bind = $mainMod SHIFT, C, exec, pkill -x gamescope #"Kill gamescope window"

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

